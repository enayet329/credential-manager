# Local dev only. Production: api → Somee, web → Vercel.
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: credvault-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Local_Dev_Passw0rd!}"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -No -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: credvault-api
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Server=sqlserver,1433;Database=CredVault;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Local_Dev_Passw0rd!};TrustServerCertificate=True;Encrypt=False;"
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: credvault-web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
    ports:
      - "3000:3000"

volumes:
  sqlserver-data:
