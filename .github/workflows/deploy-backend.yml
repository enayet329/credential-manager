name: deploy-backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "docker/Dockerfile.api"
      - "global.json"
      - "Directory.Build.props"
      - "Directory.Packages.props"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/credvault-api
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Manual approval gate on the `production` environment (configure in repo settings)
    environment:
      name: production
      url: https://credvault.somee.com
    steps:
      - name: Trigger Somee deployment
        env:
          SOMEE_DEPLOY_HOOK: ${{ secrets.SOMEE_DEPLOY_HOOK }}
          IMAGE: ${{ needs.build-and-push.outputs.image }}
        run: |
          if [ -z "${SOMEE_DEPLOY_HOOK:-}" ]; then
            echo "::error::SOMEE_DEPLOY_HOOK secret is not configured."
            exit 1
          fi
          echo "Deploying image: ${IMAGE}"
          curl --fail --show-error --silent \
            -X POST "${SOMEE_DEPLOY_HOOK}" \
            -H "Content-Type: application/json" \
            -d "{\"image\":\"${IMAGE}\"}"
